<!DOCTYPE html>
<html lang="" class="bg-surface-0 dark:bg-surface-950">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vite App</title>
    <script>
      let stored = null

      try {
        stored = window.localStorage.getItem(__THEME_STORAGE_KEY__)
      } catch {}

      if (stored === __THEME_DARK_CLASS__ || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add(__THEME_DARK_CLASS__)
      }
    </script>
  </head>
  <body class="bg-surface-0 dark:bg-surface-950 text-surface-900 dark:text-surface-0 min-h-screen transition-colors duration-500">
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
